<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dancestagram Lite - Login</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="retro">
    <header class="site-header">
      <div class="brand">
        <span class="brand-title">Dancestagram Lite</span>
        <span class="brand-subtitle">Login</span>
      </div>
      <div class="controls">
        <a class="button-link" href="index.html">Back to App</a>
      </div>
    </header>

    <main class="layout">
      <section class="panel">
        <h2>Sign In</h2>
        <label class="field">
          <span>Bluesky handle</span>
          <input id="handleInput" type="text" placeholder="your-handle.bsky.social" />
        </label>
        <div class="controls">
          <button id="loginBtn" type="button">Connect</button>
          <button id="logoutBtn" type="button" disabled>Disconnect</button>
        </div>
        <div class="readout" id="authStatus">Auth: not connected</div>
        <p class="helper">
          OAuth uses this site’s client metadata. You won’t need to paste a client ID.
        </p>
      </section>
    </main>

    <script type="module" src="login.js"></script>
  </body>
</html>
