<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MIFCSIF</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="retro">
    <main class="app">
      <section class="feed">
        <div class="topbar">
          <div class="brand">
            <span class="brand-title">M.I.C.S.I.F.</span>
            <span class="brand-subtitle">Movement Interface for Custom Social Image Feeds</span>
          </div>
          <div class="controls">
            <button id="startBtn" type="button">Start Camera</button>
            <button id="stopBtn" type="button" disabled>Stop</button>
          </div>
        </div>

        <div class="bottombar feed-menu">
          <span class="menu-label">Feed Picker</span>
          <div class="feed-input-row">
            <label class="field">
              <span>Feed URL</span>
              <input id="feedUrlInput" type="text" placeholder="Paste feed URL" />
            </label>
            <div class="controls">
              <button id="fetchFeedBtn" type="button" class="icon-button" aria-label="Fetch feed">▶</button>
            </div>
          </div>
          <div class="preset-row">
            <button id="presetCnyBtn" type="button" class="preset-button">Chinese New Year</button>
            <button id="presetDanceBtn" type="button" class="preset-button">Dance</button>
            <button id="presetBirdsBtn" type="button" class="preset-button">Birds</button>
            <button id="presetGardenBtn" type="button" class="preset-button">Gardening</button>
          </div>
        </div>

        <div class="debug-row debug-top">
          <span id="stateReadout">State: idle</span>
          <span id="hudBelow">Below: --</span>
          <span id="hudAbove">Above: --</span>
          <span id="hudDiff">Diff: --</span>
          <span id="hudLatency">Latency: --</span>
          <span id="hudLoad">Load: --</span>
        </div>

        <div class="feed-shell">
          <img id="feedImage" alt="Feed" />
          <div class="camera-overlay">
            <video id="camera" autoplay playsinline muted></video>
            <canvas id="overlay"></canvas>
          </div>
        </div>

        <div class="status-row">
          <span id="bucketLabel">Bucket: medium</span>
          <span id="bucketCounts">slow 0 | medium 0 | fast 0</span>
          <span id="appStatus">Status: ok</span>
        </div>
      </section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
